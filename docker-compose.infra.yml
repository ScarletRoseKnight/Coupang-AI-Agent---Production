# docker-compose.infra.yml
version: '3.8'

services:
  qdrant-cluster:
    image: qdrant/qdrant:latest
    container_name: distributed_qdrant_node
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    container_name: distributed_milvus_node
    ports:
      - "19530:19530"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    depends_on:
      - etcd
      - minio
    restart: always

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes

  minio:
    image: minio/minio:latest
    volumes:
      - minio_data:/data
    command: minio server /data

volumes:
  qdrant_data:
  minio_data: